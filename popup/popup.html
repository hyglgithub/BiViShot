<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #ffffff;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }
    .setting-group {
      margin-bottom: 16px;
    }
    .setting-label {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }
    .radio-group {
      display: flex;
      gap: 12px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .slider-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: #00a1d6;
    }
    .slider-value {
      font-size: 13px;
      min-width: 35px;
      text-align: right;
    }
    button.reset-btn {
      width: 100%;
      padding: 8px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button.reset-btn:hover {
      background: #444;
    }
    .version {
      text-align: center;
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #333;
    }
  </style>
</head>
<body>
  <h2>BiViShot 设置</h2>

  <div class="setting-group">
    <div class="setting-label">截图格式</div>
    <div class="radio-group">
      <label><input type="radio" name="format" value="png"> PNG (无损)</label>
      <label><input type="radio" name="format" value="jpeg"> JPEG (有损)</label>
    </div>
  </div>

  <div class="setting-group" id="quality-group">
    <div class="setting-label">JPEG 质量</div>
    <div class="slider-container">
      <input type="range" id="quality" min="1" max="100" value="95">
      <span class="slider-value" id="quality-value">95%</span>
    </div>
  </div>

  <div class="setting-group">
    <div class="setting-label">帧步长</div>
    <div class="radio-group">
      <label><input type="radio" name="step" value="1"> 1/1秒</label>
      <label><input type="radio" name="step" value="0.2"> 1/5秒</label>
      <label><input type="radio" name="step" value="0.066667"> 1/15秒</label>
      <label><input type="radio" name="step" value="0.033333"> 1/30秒</label>
    </div>
  </div>

  <div class="setting-group">
    <button class="reset-btn" id="reset-position">恢复默认设置</button>
  </div>

  <div class="version">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
